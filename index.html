<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bertan Resinas - Manual Interativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #002D62;
            --accent-green: #25d366;
            --bg-body: #f4f7f6;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.08);
            --radius: 20px;

            /* Cores dos Produtos */
            --color-bv: #1D9E75; /* Verde */
            --color-mv: #fbc02d; /* Amarelo (tom escuro para leitura) */
            --color-av: #d32f2f; /* Vermelho */
            --color-pl: #002D62; /* Azul (usando o primário) */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background-color: var(--bg-body); color: #333; overflow-x: hidden; }

        .hero { 
            background: var(--primary-blue); 
            padding: 4rem 2rem; 
            text-align: center; 
            border-radius: 0 0 50px 50px;
            color: white;
            margin-bottom: -50px;
        }
        .hero img { max-width: 250px; margin-bottom: 0; }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 2; }

        /* Menu de Produtos */
        .product-selector {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 10px;
            scrollbar-width: none;
        }
        .product-selector::-webkit-scrollbar { display: none; }

        .product-card {
            background: white;
            min-width: 180px;
            padding: 25px 20px;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }
        .product-card.active { border-color: #ccc; transform: translateY(-5px); }
        
        /* Classes de Cores dos Textos */
        .product-card h4 { font-size: 16px; font-weight: 700; margin-bottom: 5px; }
        .txt-bv { color: var(--color-bv); }
        .txt-mv { color: var(--color-mv); }
        .txt-av { color: var(--color-av); }
        .txt-pl { color: var(--color-pl); }

        .product-card small { font-size: 12px; color: #666; font-weight: 400; }

        /* Calculadoras */
        .main-card {
            background: white;
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--card-shadow);
            margin-top: 20px;
        }

        .shape-selector {
            display: flex;
            background: #eee;
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 25px;
        }
        .shape-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: transparent;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }
        .shape-btn.active { background: var(--primary-blue); color: white; }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: 700; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        input { 
            padding: 15px; 
            border: 2px solid #f0f0f0; 
            border-radius: 12px; 
            font-size: 16px; 
            outline: none;
            transition: 0.3s;
            color: #000;
        }
        input:focus { border-color: var(--primary-blue); }

        /* Resultado Premium */
        .result-panel {
            background: #f9f9f9;
            border-radius: var(--radius);
            padding: 25px;
            text-align: center;
            border: 1px dashed #ddd;
        }
        .total-weight { font-size: 32px; font-weight: 800; color: var(--primary-blue); display: block; margin: 10px 0; }
        .mix-details { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 20px; 
            padding-top: 20px; 
            border-top: 1px solid #eee; 
        }
        .mix-box h5 { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .mix-box p { font-size: 18px; font-weight: 700; color: #333; }

        /* Info Card */
        .info-strip {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            background: var(--primary-blue);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent-green);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
